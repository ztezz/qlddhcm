name: Advanced GeoServer Keeper (Scroll & Zoom)

# Cấu hình thời gian chạy tự động
on:
  schedule:
    # Chạy chính xác mỗi 10 tiếng một lần (vào phút thứ 0)
    - cron: '0 */10 * * *'
  # Cho phép bấm nút "Run workflow" bằng tay trên giao diện GitHub Actions để test
  workflow_dispatch: 

jobs:
  browse-geoserver:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy mã nguồn từ repo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Node.js môi trường
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Bước 3: Cài đặt thư viện Playwright
    - name: Install Playwright (Trình duyệt ảo)
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    # Bước 4: Chạy script mở trình duyệt ảo, truy cập Frontend, cuộn trang và zoom bản đồ
    - name: Run Zoom & Scroll Script
      run: |
        node -e "
        const { chromium } = require('playwright');
        (async () => {
          // 1. Mở trình duyệt ẩn danh với các tham số tối ưu cho môi trường không màn hình (Headless)
          const browser = await chromium.launch({ 
            headless: true,
            args: [
              '--no-sandbox', 
              '--disable-setuid-sandbox', 
              '--disable-gl-drawing-for-tests',
              '--use-gl=angle', 
              '--use-angle=swiftshader' // Ép trình duyệt render WebGL bằng CPU thay vì GPU
            ]
          });
          const page = await browser.newPage();
          
          // Đặt kích thước màn hình giả lập
          await page.setViewportSize({ width: 1280, height: 720 });

          // 2. Đi tới trang Frontend
          const url = 'https://qlddhcm.io.vn';
          console.log('Đang truy cập vào: ' + url);
          
          try {
            // Chờ cho đến khi mạng không còn tải thêm gì nữa (trong ít nhất 500ms)
            await page.goto(url, { waitUntil: 'networkidle', timeout: 90000 });
          } catch(e) {
            console.log('Chờ tải trang hết hạn hoặc gặp lỗi mạng, nhưng vẫn tiếp tục...');
          }

          // Đợi thêm 20 giây cho các layer GeoServer tải và hiển thị
          console.log('Đang chờ 20 giây cho bản đồ render các layer...');
          await page.waitForTimeout(20000); 

          // 3. Thao tác cuộn chuột xuống đáy trang rồi cuộn lên
          console.log('Đang thực hiện cuộn trang...');
          await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
          await page.waitForTimeout(2000);
          await page.evaluate(() => window.scrollTo(0, 0));
          await page.waitForTimeout(2000);

          // 4. Thao tác mô phỏng CUỘN BÁNH XE CHUỘT (Mouse Wheel) để ZOOM
          console.log('Đang giả lập cuộn chuột để ZOOM IN...');
          await page.mouse.move(640, 360);
          await page.mouse.wheel(0, -500); // Phóng to
          await page.waitForTimeout(3000); // Tăng thời gian chờ bản đồ load lại sau khi zoom

          console.log('Đang giả lập cuộn chuột để ZOOM OUT...');
          await page.mouse.wheel(0, 500);  // Thu nhỏ
          await page.waitForTimeout(5000); // Chờ 5 giây cuối cùng để hình ảnh ổn định trước khi chụp

          // 5. Chụp ảnh màn hình toàn trang để tránh bỏ sót
          await page.screenshot({ path: 'geoserver-status.png', fullPage: true });
          console.log('Đã tương tác xong và chụp ảnh màn hình.');

          await browser.close();
        })();
        "

    # Bước 5: Đẩy bức ảnh chụp màn hình lên mục Artifact của GitHub
    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      with:
        name: geoserver-screenshot
        path: geoserver-status.png
        retention-days: 3