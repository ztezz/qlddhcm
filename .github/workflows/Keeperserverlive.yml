name: Advanced GeoServer Keeper (Scroll & Zoom)

# Cấu hình thời gian chạy tự động
on:
  schedule:
    # Chạy chính xác mỗi 10 tiếng một lần (vào phút thứ 0)
    - cron: '0 */10 * * *'
  # Cho phép bấm nút "Run workflow" bằng tay trên giao diện GitHub Actions để test
  workflow_dispatch: 

jobs:
  browse-geoserver:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy mã nguồn từ repo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Node.js môi trường
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Bước 3: Cài đặt thư viện Playwright
    - name: Install Playwright (Trình duyệt ảo)
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    # Bước 4: Chạy script mở trình duyệt ảo, truy cập Frontend, cuộn trang và zoom bản đồ
    - name: Run Zoom & Scroll Script
      run: |
        node -e "
        const { chromium } = require('playwright');
        (async () => {
          // Khởi chạy trình duyệt với tập hợp cờ tối ưu triệt để cho WebGL trên Ubuntu Headless
          const browser = await chromium.launch({ 
            headless: true,
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-gpu',               // Vô hiệu hóa phần cứng GPU thật
              '--disable-software-rasterizer', // Tránh xung đột phần mềm cũ
              '--use-gl=swiftshader',         // Ép Chrome dùng thư viện đồ họa phần mềm SwiftShader
              '--hide-scrollbars'
            ]
          });
          
          const context = await browser.newContext({
            ignoreHTTPSErrors: true // Bỏ qua nếu có lỗi SSL/HTTPS của domain
          });
          const page = await context.newPage();
          
          // Đặt kích thước màn hình giả lập
          await page.setViewportSize({ width: 1280, height: 720 });

          const url = 'https://qlddhcm.io.vn';
          console.log('Đang truy cập vào: ' + url);
          
          try {
            // Chờ load xong dom content thay vì networkidle nếu mạng bị nghẽn
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
          } catch(e) {
            console.log('Hết thời gian chờ trang load, tiếp tục chạy...');
          }

          // Chờ thêm 25 giây cố định để Mapbox/OpenLayers render xong canvas
          console.log('Đang chờ 25 giây cho bản đồ render các layer...');
          await page.waitForTimeout(25000); 

          // Thao tác cuộn trang
          console.log('Đang thực hiện cuộn trang...');
          await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
          await page.waitForTimeout(2000);
          await page.evaluate(() => window.scrollTo(0, 0));
          await page.waitForTimeout(2000);

          // Giả lập zoom
          console.log('Đang giả lập cuộn chuột để ZOOM IN...');
          await page.mouse.move(640, 360);
          await page.mouse.wheel(0, -500); 
          await page.waitForTimeout(4000); // Chờ bản đồ load tile mới sau zoom

          console.log('Đang giả lập cuộn chuột để ZOOM OUT...');
          await page.mouse.wheel(0, 500);  
          await page.waitForTimeout(5000); // Chờ ổn định ảnh trước khi chụp

          // Chụp màn hình theo khung viewport cố định để tránh lỗi tính toán chiều cao canvas
          await page.screenshot({ path: 'geoserver-status.png' });
          console.log('Đã tương tác xong và chụp ảnh màn hình.');

          await browser.close();
        })();
        "

    # Bước 5: Đẩy bức ảnh chụp màn hình lên mục Artifact của GitHub
    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      with:
        name: geoserver-screenshot
        path: geoserver-status.png
        retention-days: 3